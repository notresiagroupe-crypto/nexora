name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          npm install -g vercel@latest
          vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --name nexora-studio 2>&1
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
